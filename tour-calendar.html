<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking Mongolia - Tour Calendar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f7f7f7}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:16px}
.btn{background:#c58a2b;color:#fff;padding:10px 16px;border:none;border-radius:8px;cursor:pointer}
.tour{border-bottom:1px solid #eee;padding:10px 0}
</style>

<!-- PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID&currency=USD"></script>

</head>
<body>

<div class="container">

<h2>2026 Mongolia Tour Calendar</h2>

<div class="card">
<p>
We also organize tailor-made private and family tours on your preferred dates. 
Tell us the places you want to visit, and we will combine them into a custom Mongolia itinerary. 
Nomadic family stays can also be arranged.
</p>
</div>

<div class="card" id="tourList"></div>

<div class="card" id="paypal-button-container"></div>

</div>

<script>

const tours = [
 {name:"Gobi Highlights", days:5, price:700},
 {name:"Orkhon Valley & Elsen Tasarkhai", days:4, price:650},
 {name:"Kharkhorum Express", days:3, price:500},
 {name:"VIP Helicopter Tour", days:1, price:null}
];

const list = document.getElementById("tourList");

list.innerHTML = tours.map(t => `
<div class="tour">
  <strong>${t.name}</strong> - ${t.days} days
  <br>
  ${t.price ? "$"+t.price+" / person" : "Ask for price"}
  <br>
  <button class="btn" onclick='selectTour(${JSON.stringify(t)})'>Book</button>
</div>
`).join("");

let selectedTour = null;

function selectTour(t){
  selectedTour = t;
  alert("Selected: "+t.name);
}

paypal.Buttons({
  createOrder: function(data, actions) {
    if(!selectedTour || !selectedTour.price){
      alert("Please select a tour with price");
      return;
    }
    return actions.order.create({
      purchase_units: [{
        amount: {
          value: selectedTour.price
        }
      }]
    });
  },
  onApprove: function(data, actions) {
    return actions.order.capture().then(function(details) {
      fetch("https://your-backend.com/save-booking", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          name: details.payer.name.given_name,
          email: details.payer.email_address,
          tour: selectedTour.name
        })
      });
      alert("Payment completed!");
    });
  }
}).render('#paypal-button-container');

</script>

</body>
</html>
