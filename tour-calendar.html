<!-- FINAL UPDATED VERSION (VIP hidden + date picker + open season + short tours added) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tour Calendar</title>
</head>
<body>

<!-- ONLY IMPORTANT CHANGES SHOWN -->

<!-- ✅ DATE PICKER -->
<input id="selectedDate" type="date" min="2026-05-01" max="2026-10-31">

<script>

// ✅ UPDATED PRICE FORMAT
function formatPrice(value){
  if(!value) return 'On request';
  return '$' + value.toLocaleString();
}

// ✅ NEW SHORT TOURS ADDED
const extraTours = [
{
  id:'hustai-elsen-3d',
  name:'Hustai + Elsen Tasarkhai 3 Days',
  region:'central',
  style:'culture',
  days:3,
  status:'guaranteed',
  image:'images/destinations/elsen-tasarkhai.jpg',
  highlights:['Hustai wild horses','Nomadic family','Camel riding'],
  dates:['Flexible'],
  prices:{1:680,2:520,3:470,4:430},
  fromUB:'Road trip',
  season:'May–Oct',
  group:'1-3'
},
{
  id:'orkhon-elsen-4d',
  name:'Orkhon Valley + Elsen Tasarkhai 4 Days',
  region:'central',
  style:'nature',
  days:4,
  status:'guaranteed',
  image:'images/destinations/orkhon-waterfall.jpg',
  highlights:['Orkhon waterfall','Nomadic life','Camel riding'],
  dates:['Flexible'],
  prices:{1:880,2:650,3:590,4:540},
  fromUB:'Road trip',
  season:'May–Oct',
  group:'4–5'
}
];

// 👉 MERGE TOURS
const tours = [...extraTours];

// ✅ FILTER (VIP hidden)
function renderTours(){
  const filtered = tours.filter(t => {
    if(t.style === 'luxury') return false; // VIP hidden
    return true;
  });

  document.getElementById('tourGrid').innerHTML = filtered.map(t => `
    <div>
      <h3>${t.name}</h3>
      <p><strong>Travel Period:</strong> Open May–October</p>
      <p>${formatPrice(t.prices[1])}</p>
      <button onclick="openBooking('${t.name}')">Book Now</button>
    </div>
  `).join('');
}

function openBooking(name){
  document.getElementById('selectedTour').value = name;
  document.getElementById('selectedDate').value = '';
}

renderTours();

</script>

</body>
</html>
